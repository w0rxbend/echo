server:
  addr: ":8080"
  admin_token_env: "MATRIX_PROXY_ADMIN_TOKEN"

# Multi-device format (preferred).
# Each key is a device ID used in API paths: /api/v1/devices/{device}/play etc.
# Device IDs must be alphanumeric with hyphens or underscores.
devices:
  living-room:
    host: "192.168.1.127"
    port: 7777
    connect_timeout: 5s
    response_timeout: 2s
    heartbeat_interval: 5s
    # Idle heartbeat probes run on the scheduler selection path. Newly queued
    # matrix work can wait up to this timeout behind an in-progress probe.
    probe_timeout: 2s
    reconnect_min_delay: 500ms
    reconnect_max_delay: 10s
    brightness: 30
    layout:
      width: 8
      height: 8
      wiring: "h-tl"
      odd_row_display_flip: true
    background:
      # This ID is loaded from configs/animations.example.yaml as a firmware_preset.
      # When restore_on_idle is true and animation is set, the scheduler treats this
      # background as desired device state and converges back to it whenever idle.
      animation: "matrix_rain_background"
      restore_on_idle: true

  # Add more devices here:
  # bedroom:
  #   host: "192.168.1.128"
  #   port: 7777
  #   ...
  #   background:
  #     animation: "alert_pulse"
  #     restore_on_idle: false

# Legacy single-device format — still accepted for backward compatibility.
# Use the 'devices:' map above for new configurations.
# matrix:
#   host: "192.168.1.127"
#   port: 7777
#   ...
# background:
#   animation: "matrix_rain_background"
#   restore_on_idle: true

queue:
  # Event bus subscriber channel capacity.
  events_buffer: 512
  play_buffer: 128
  # Only "block" is currently supported.
  overflow_policy: "block"
  # Nonzero dedup windows are rejected until event deduplication is implemented.
  dedup_window: 0s

animations_file: "configs/animations.example.yaml"
rules_file: "configs/rules.example.yaml"
