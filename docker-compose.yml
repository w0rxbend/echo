services:
  matrix-proxy:
    build: .
    ports:
      - "${PROXY_PORT:-8080}:8080"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      MATRIX_PROXY_ADMIN_TOKEN: ${MATRIX_PROXY_ADMIN_TOKEN:?Set MATRIX_PROXY_ADMIN_TOKEN in .env or environment}
    command: ["-config", "configs/config.yaml", "-log-level", "${LOG_LEVEL:-info}"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Optional observability stack — start with: docker compose --profile observability up
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - matrix-proxy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
